name: Deploy production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml

  build-push:
    name: Build and push GHCR (production)
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Registry login (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Image name and tag
        id: meta
        run: |
          set -euo pipefail
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${REPO_LOWER}:production" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}:sha-${{ github.sha }}
          build-args: |
            DATABASE_URL=mysql://ci:ci@127.0.0.1:3306/ci

  deploy:
    name: Deploy production (env + Docker)
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    steps:
      - name: Écrire .env depuis le secret (valeur brute)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          python3 -c "import os, pathlib; t=os.environ.get('ENV_FILE',''); assert t.strip(), 'ENV_FILE vide (production)'; pathlib.Path('.env').write_text(t)"

      - name: Copier .env sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: .env
          target: ${{ vars.DEPLOY_PATH }}

      - name: SSH — pull & up
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_IMAGE: ${{ needs.build-push.outputs.image }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: API_IMAGE,GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            # Shell non interactif : souvent pas de /snap/bin ni profil complet (docker introuvable sinon).
            [ -f /etc/profile ] && . /etc/profile || true
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:${PATH:-}"
            command -v docker >/dev/null 2>&1 || { echo "docker introuvable (PATH=$PATH). Installe Docker ou ajoute son répertoire au PATH."; exit 127; }
            DEPLOY="${{ vars.DEPLOY_PATH }}"
            if [ -z "${DEPLOY}" ]; then
              echo "Définir la variable DEPLOY_PATH dans l’environnement GitHub production."
              exit 1
            fi
            if [ -z "${GHCR_TOKEN:-}" ] || [ -z "${GHCR_USER:-}" ]; then
              echo "GHCR_READ_TOKEN et GHCR_USERNAME doivent être définis dans l’environnement production."
              exit 1
            fi
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            cd "${DEPLOY}"
            chmod 600 .env 2>/dev/null || true
            export API_IMAGE="${API_IMAGE}"
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --remove-orphans api
            docker logout ghcr.io || true
