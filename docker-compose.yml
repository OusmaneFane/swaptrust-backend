services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${API_PORT:-3001}:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      UPLOAD_DEST: /app/uploads
      DATABASE_URL: mysql://swaptrust:password@mysql:3306/swaptrust
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    env_file:
      - path: .env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root-mysql
      MYSQL_DATABASE: swaptrust
      MYSQL_USER: root
      MYSQL_PASSWORD: root-mysql
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-ppassword']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  mysql_data:
  uploads_data:
