# Pull requests : tests, build Nest, smoke build Docker (sans push).
# Déploiements : deploy-staging.yml (branches develop/staging), deploy-production.yml (main).

name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml

  docker-verify:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: swap-trust-backend:ci
          build-args: |
            DATABASE_URL=mysql://ci:ci@127.0.0.1:3306/ci
